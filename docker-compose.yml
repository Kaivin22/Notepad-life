services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_DATABASE: notedb
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3307:3306"

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    restart: always
    environment:
      - DB_HOST=mysql
      - DB_USER=root
      - DB_PASSWORD=admin123
      - DB_NAME=notedb
      - PORT=5000
      - APP_NAME=NotepadLife
    depends_on:
      - mysql

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    restart: always
    depends_on:
      - backend

volumes:
  db_data:
