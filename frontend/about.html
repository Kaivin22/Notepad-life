<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Thông tin cá nhân</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .about-card {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      max-width: 500px;
      margin: 50px auto;
      text-align: center;
    }
    .about-card h2 { color: #1a73e8; margin-top: 0; }
    .about-card p { font-size: 16px; color: #555; }
    .about-card strong { color: #333; }
    .btn-back {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background-color: #34a853;
      color: white;
      text-decoration: none;
      border-radius: 4px;
      font-weight: bold;
    }
    .btn-back:hover { background-color: #2d7a43; }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="about-card">
      <h2>Thông tin sinh viên</h2>
      <p><strong>Họ và tên:</strong> Nguyễn Văn Tuấn</p>
      <p><strong>Mã số sinh viên:</strong> 2251220274</p>
      <p><strong>Lớp:</strong> 22CT4</p>
      <a href="/index.html" class="btn-back">Quay lại Trang chủ</a>
    </div>
  </div>
</body>
</html>
