<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simplistic Note App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header>
      <h1>Note App</h1>
      <div id="breadcrumbs" class="breadcrumbs">
        <span onclick="navigateToRoot()">Home</span>
      </div>
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="🔍 Tìm kiếm rỗng tự động thư mục hoặc ghi chú..." oninput="handleSearch()">
      </div>
      <div class="actions">
        <button onclick="openFolderModal()">+ Thư mục</button>
        <button onclick="openNoteModal()">+ Ghi chú</button>
        <label class="btn-upload" for="file-upload-input">📤 Tải file .txt lên</label>
        <input type="file" id="file-upload-input" accept=".txt" style="display:none" onchange="uploadFile(this)">
      </div>
    </header>

    <main id="content-area">
      <!-- Dữ liệu render ra đây bằng JS -->
    </main>

    <!-- Modal Thư Mục -->
    <div id="folder-modal" class="modal">
      <div class="modal-content">
        <h2>Thư mục</h2>
        <input type="text" id="folder-name" placeholder="Tên thư mục...">
        <div class="modal-actions">
          <button onclick="closeModals()">Thoát</button>
          <button onclick="saveFolder()">Lưu</button>
        </div>
      </div>
    </div>

    <!-- Modal Ghi chú -->
    <div id="note-modal" class="modal">
      <div class="modal-content large">
        <h2>Ghi chú</h2>
        <input type="text" id="note-title" placeholder="Tiêu đề ghi chú...">
        <textarea id="note-content" placeholder="Nội dung..."></textarea>
        <div class="modal-actions">
          <button onclick="closeModals()">Thoát</button>
          <button onclick="saveNote()">Lưu</button>
        </div>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
